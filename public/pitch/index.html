<template id="t-sec">
  <span class="eyebrow">Security</span>
  <h2>Defense in depth. Every layer assumes the layer above is compromised.</h2>
  <ul>
    <li>TLS 1.3 + HSTS at the edge; CSP, Referrer-Policy, X-Content-Type-Options via Helmet.</li>
    <li>OTP rotated hourly + 15-minute HttpOnly Secure SameSite session cookie.</li>
    <li>AES-256-GCM under an HKDF-SHA-256 derived key. 96-bit IV, 128-bit auth tag.</li>
    <li>Per-voter blind hash prevents double-vote without storing voter_id with the ballot.</li>
    <li>Merkle root after every append. Receipts let any voter verify inclusion.</li>
    <li>PII never enters logs, URLs, or analytics. Logs are JSON, structured, ring-buffered.</li>
    <li>Roadmap: full ML-KEM-768 + X25519 hybrid + ML-DSA-65 root signatures.</li>
  </ul>
</template>

<template id="t-audit">
  <span class="eyebrow">Audit</span>
  <h2>Every voter holds a receipt. Every observer holds the root.</h2>
  <p>An append-only Merkle tree over SHA-256 leaves. Each ballot leaf <span class="k">L = SHA-256(ballot_id || ts || ciphertext)</span>. The root is recomputed after every append and returned as part of the receipt.</p>
  <ul>
    <li><span class="k">GET /api/audit/root</span> &mdash; current root + size</li>
    <li><span class="k">GET /api/audit/tail?n=50</span> &mdash; most recent leaves</li>
    <li><span class="k">GET /api/audit/ballots?n=100</span> &mdash; ciphertext + per-vote root</li>
  </ul>
  <p>An external observer can recompute the root over the published leaves and confirm inclusion of any one of them in O(log n).</p>
</template>

<script>
const TEMPLATE_IDS = [
  't-cover','t-problem','t-whynow','t-solution','t-demo','t-arch','t-sec','t-a11y',
  't-perf','t-stack','t-audit','t-roadmap','t-quality','t-deploy','t-ask','t-thanks'
];
const SLIDES = TEMPLATE_IDS.map(id => document.getElementById(id));

const deck = document.getElementById('deck');
const dotsBox = document.getElementById('dots');
const progress = document.getElementById('progress');

let idx = 0;
const sections = [];

function render() {
  deck.replaceChildren();
  dotsBox.replaceChildren();
  sections.length = 0;
  SLIDES.forEach((tpl, i) => {
    const sec = document.createElement('section');
    sec.className = 'slide';
    sec.setAttribute('aria-hidden', i === idx ? 'false' : 'true');
    sec.setAttribute('role', 'group');
    sec.setAttribute('aria-label', `Slide ${i + 1} of ${SLIDES.length}`);
    sec.appendChild(tpl.content.cloneNode(true));
    if (i === idx) sec.classList.add('active');
    deck.appendChild(sec);
    sections.push(sec);

    const dot = document.createElement('button');
    dot.className = 'dot';
    dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
    if (i === idx) dot.setAttribute('aria-current', 'true');
    dot.addEventListener('click', () => go(i));
    dotsBox.appendChild(dot);
  });
  document.getElementById('cur').textContent = String(idx + 1);
  document.getElementById('total').textContent = String(SLIDES.length);
  progress.style.width = (((idx + 1) / SLIDES.length) * 100).toFixed(1) + '%';
  history.replaceState(null, '', '#' + (idx + 1));
}

function go(i) { idx = (i + SLIDES.length) % SLIDES.length; render(); }
function next() { go(idx + 1); }
function prev() { go(idx - 1); }

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ' || e.key === 'l' || e.key === 'j') next();
  else if (e.key === 'ArrowLeft' || e.key === 'PageUp' || e.key === 'h' || e.key === 'k') prev();
  else if (e.key === 'Home') go(0);
  else if (e.key === 'End') go(SLIDES.length - 1);
  else if (e.key === 'f') document.documentElement.requestFullscreen?.();
  else if (/^\d$/.test(e.key)) go(Number(e.key) - 1);
});
document.getElementById('next').addEventListener('click', next);
document.getElementById('prev').addEventListener('click', prev);
document.getElementById('full').addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen?.();
});

let touchStartX = null;
deck.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
deck.addEventListener('touchend', (e) => {
  if (touchStartX == null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) (dx < 0 ? next() : prev());
  touchStartX = null;
}, { passive: true });

const initial = parseInt(location.hash.replace('#', ''), 10);
if (initial && initial >= 1 && initial <= SLIDES.length) idx = initial - 1;
render();
deck.focus();
</script>
</body>
